<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Générer Prompt — OUTILS JUSTIFIT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg:#f3f5f7;
      --nav:#001d50;
      --accent:#66a2a0;
      --accent-hover:#4c7b7b;
      --ink:#333;
      --card:#001d50;         /* carte sombre pour homogénéité avec tes pages */
      --cardText:#ffffff;
      --radius:12px;
      --shadow:0 6px 18px rgba(0,0,0,.15);

      --primary:#0066ff; --primary-600:#0055d4;
      --soft:#f5f7fa; --line:#e5e7eb; --accentMono:#e8f0fe;

      /* Mode SEO */
      --seo-bg:#fff7ea;       /* fond page */
      --seo-card:#fff7ea;     /* fond carte */
      --seo-border:#facc15;
      --seo-ink:#233044;
    }

    *{box-sizing:border-box}
    body{ margin:0; font-family:Arial, Helvetica, sans-serif; background:var(--bg); color:var(--ink); }

    /* NAVBAR (même style que tes autres pages) */
    .navbar{
      position:fixed; top:0; left:0; right:0; z-index:1000;
      background:var(--nav); padding:10px 0; text-align:center;
    }
    .navbar a{
      color:#fff; text-decoration:none; font-weight:bold;
      padding:10px 20px; border-radius:5px; display:inline-block; transition:.25s;
    }
    .navbar a:hover{ background:var(--accent-hover) }
    .navbar .ask-btn{
      background:linear-gradient(135deg,#6a11cb,#2575fc); margin-left:10px;
    }
    .navbar .ask-btn:hover{
      background:linear-gradient(135deg,#2575fc,#6a11cb);
      transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.25);
    }

    /* Layout */
    main{ padding:100px 16px 40px; display:flex; justify-content:center; }
    .card{
      width:100%; max-width:980px; background:var(--card); color:var(--cardText);
      border-radius:var(--radius); box-shadow:var(--shadow);
      padding:24px; border:1px solid transparent;
      transition: background .25s ease, color .25s ease, border-color .25s ease;
    }
    h1{ margin:0 0 6px; text-align:center; font-size:26px; color:#fff; }
    .subtitle{ text-align:center; opacity:.9; font-size:14px; margin-bottom:12px; color:#dbe5ff; }
    .hr{ height:3px; width:64px; background:var(--accent); border-radius:2px; margin:8px auto 16px;}

    /* Mode selector */
    .mode{
      display:flex; gap:.5rem; background:#0f2a66; border:1px solid rgba(255,255,255,.14);
      padding:.5rem; border-radius:12px; margin-bottom:1rem; flex-wrap:wrap; justify-content:center;
    }
    .mode input{display:none}
    .seg{
      padding:.55rem .9rem; border-radius:10px; cursor:pointer; user-select:none;
      border:1px solid transparent; font-weight:700; color:#fff; background:transparent;
    }
    .seg.active{ background:#123b8a; border-color:#3b82f6; box-shadow:0 1px 0 rgba(2,6,23,.06); }
    .badge{
      display:inline-block; padding:.25rem .5rem; border-radius:999px; font-size:.75rem; font-weight:700;
      border:1px solid rgba(255,255,255,.3); margin-left:.5rem; color:#fff; background:rgba(255,255,255,.06);
    }

    /* Form */
    label{ display:block; font-weight:700; margin:.75rem 0 .4rem; color:#fff; }
    input[type="text"], textarea, select{
      width:100%; padding:10px 12px; border-radius:10px; border:1px solid #ced4da;
      background:#f8fafc; color:#333; font-size:14px; transition:.2s border, .2s box-shadow;
    }
    input[type="text"]:focus, textarea:focus, select:focus{
      outline:none; border-color:#66a2a0; box-shadow:0 0 0 3px rgba(102,162,160,.28);
    }
    textarea{ min-height:140px; resize:vertical }
    .counter{ font-size:.82rem; color:#c7d2fe; text-align:right; margin-top:.25rem; opacity:.9; }
    .counter.bad{ color:#ffd2a6 } .counter.good{ color:#a7f3d0 }

    .row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    @media (max-width:900px){ .row{ grid-template-columns:1fr; } }

    .concurrent-block{
      border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.06);
      border-radius:10px; padding:14px; margin-top:12px;
    }

    /* Toolbars */
    .toolbar{ display:flex; gap:.6rem; flex-wrap:wrap; align-items:center; margin:12px 0; }
    .toolbar.bottom{ justify-content:flex-end; }
    button{
      background:linear-gradient(135deg, #66a2a0, #4c7b7b); color:#fff; border:none; padding:.75rem 1rem;
      border-radius:10px; cursor:pointer; font-weight:800; font-size:.95rem;
      transition:.18s transform, .18s box-shadow, .18s filter; box-shadow:0 8px 16px rgba(0,0,0,.18);
    }
    button:hover{ transform:translateY(-1px); box-shadow:0 12px 22px rgba(0,0,0,.22); }
    .btn-ghost{ background:#fff; color:#0f172a; border:1px solid #d1d5db; box-shadow:none; }
    .btn-ghost:hover{ border-color:#3b82f6; color:#3b82f6; }
    .btn-danger{ background:#ef4444; box-shadow:0 8px 16px rgba(239,68,68,.35); }
    .btn-danger:hover{ filter:saturate(1.05); }

    /* Output */
    .output-head{
      display:flex; justify-content:space-between; align-items:center; gap:10px;
      margin-top:16px; padding:10px 12px; border-radius:10px;
      background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14);
    }
    .output-title{font-weight:800;}
    #generatedPrompt{
      white-space:pre-wrap; background:var(--accentMono); color:#0f172a;
      padding:14px; border-radius:10px; border:1px solid #c7dafc; margin-top:8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      max-height:560px; overflow:auto; scroll-behavior:smooth;
    }
    body.seo-mode .output-head{ background:#fffdfa; border-color:#ffe7b3; }

    /* Toast */
    .toast{
      position:fixed; top:20px; left:50%; transform:translateX(-50%);
      background:#4caf50; color:#fff; padding:10px 18px;
      border-radius:6px; font-size:14px; opacity:0; visibility:hidden;
      transition:opacity .3s, visibility .3s; z-index:2000;
      box-shadow:0 6px 14px rgba(0,0,0,.2);
    }
    .toast.show{ opacity:1; visibility:visible; }

    /* ======= Mode SEO : change le fond de la page ET celui de la carte outil ======= */
    body.seo-mode{ background:var(--seo-bg); }
    body.seo-mode .card{
      background:var(--seo-card); color:var(--seo-ink); border-color:var(--seo-border);
    }
    body.seo-mode h1, body.seo-mode label{ color:var(--seo-ink); }
    body.seo-mode .mode{ background:#863efa; border-color:var(--seo-border); }
    body.seo-mode .seg{ color:#1c2b4f; }
    body.seo-mode .seg.active{ background:#fff; border-color:var(--seo-border); }
    body.seo-mode .badge{ background:#fff3d4; border-color:var(--seo-border); color:#0f172a; }
    body.seo-mode .concurrent-block{ background:#fffdfa; border-color:#ffe7b3; }
  </style>
</head>
<body>

  <!-- NAV -->
  <div class="navbar">
    <a href="index.html">Call To Action</a>
    <a href="ctabouton.html">CTA Bouton</a>
    <a href="majusculeconvert.html">Convers MAJ</a>
    <a href="nofollowcode.html">No Follow</a>
    <a href="sourcearticle.html">Source</a>
        <a href="promptjuridique.html">Ancien Outil</a>
        <a href="generer-prompt.html" class="tab-btn">Générer Prompt</a>
  </div>

  <div id="toast" class="toast">Copié ✅</div>

  <main>
    <section class="card">
      <h1>Prompt — Réécriture et Optimisation
        <span id="modeBadge" class="badge">Mode : Réécriture</span>
      </h1>
      <div class="subtitle">Réécriture totale ou optimisation SEO/GEO. Format direct, juridique, helpful et orienté mise en relation avocat.</div>
      <div class="hr"></div>

      <!-- Mode selector -->
      <div class="mode" id="modeBox">
        <label class="seg active" id="seg-rewrite">
          <input type="radio" name="mode" value="rewrite" checked>
          Analyse & Réécriture Totale
        </label>
        <label class="seg" id="seg-seo">
          <input type="radio" name="mode" value="seo">
          Optimisation SEO/GEO (retouches)
        </label>
      </div>

      <div class="row">
        <div>
          <label for="articleTitle">Titre de l'article à analyser</label>
          <input type="text" id="articleTitle" placeholder="Entrez le titre ici..."/>
        </div>
        <div>
          <label for="market">Pays / marché juridique</label>
          <select id="market">
            <option value="Non précisé">Non précisé</option>
            <option value="France">France</option>
            <option value="Belgique">Belgique</option>
            <option value="Royaume-Uni">Royaume-Uni</option>
          </select>
        </div>
      </div>

      <label for="articleContent">Contenu de l'article à analyser</label>
      <textarea id="articleContent" rows="10" placeholder="Collez ici le contenu de votre article..."></textarea>
      <div class="counter" id="articleCounter">0 caractères</div>

      <div id="concurrentsContainer"></div>

      <!-- Instructions supplémentaires -->
      <div style="margin-top:14px;">
        <label for="extraInstructions">Instructions supplémentaires (facultatif)</label>
        <textarea id="extraInstructions" rows="6" placeholder="Ajoute ici des consignes spécifiques (style, ton, contraintes SEO, éléments juridiques à insister, etc.). Elles seront ajoutées en bas du prompt généré."></textarea>
      </div>

      <!-- Toolbar du milieu : Ajouter concurrent (au-dessus des actions finales) + Reset -->
      <div class="toolbar">
        <button class="btn-ghost" id="btnAddCompetitor">+ Ajouter un article concurrent</button>
        <button class="btn-danger" id="btnReset">Réinitialiser</button>
      </div>

      <!-- Résultat -->
      <div class="output-head" id="outputHead">
        <span class="output-title">Prompt généré</span>
        <button class="btn-ghost" id="btnCopyTop" type="button">Copier le Prompt</button>
      </div>
      <div id="generatedPrompt" aria-live="polite"></div>

      <!-- Toolbar tout en bas : Générer + Copier (derniers boutons) -->
      <div class="toolbar bottom">
        <button id="btnGenerate">Générer le Prompt</button>
        <button class="btn-ghost" id="btnCopy">Copier le Prompt</button>
      </div>
    </section>
  </main>

  <script>
    // ====== Éléments ======
    let competitorCount = 0;
    const els = {
      body: document.body,
      modeBox: document.getElementById('modeBox'),
      segRewrite: document.getElementById('seg-rewrite'),
      segSEO: document.getElementById('seg-seo'),
      modeBadge: document.getElementById('modeBadge'),

      articleTitle: document.getElementById('articleTitle'),
      market: document.getElementById('market'),
      articleContent: document.getElementById('articleContent'),
      articleCounter: document.getElementById('articleCounter'),
      concurrentsContainer: document.getElementById('concurrentsContainer'),
      btnAddCompetitor: document.getElementById('btnAddCompetitor'),
      btnGenerate: document.getElementById('btnGenerate'),
      btnCopy: document.getElementById('btnCopy'),
      btnCopyTop: document.getElementById('btnCopyTop'),
      btnReset: document.getElementById('btnReset'),
      output: document.getElementById('generatedPrompt'),
      extra: document.getElementById('extraInstructions'),
      toast: document.getElementById('toast')
    };

    // ====== Mode ======
    function getMode(){
      return document.querySelector('input[name="mode"]:checked')?.value || 'rewrite';
    }
    function setMode(mode){
      const rewrite = mode === 'rewrite';
      document.querySelector('input[name="mode"][value="rewrite"]').checked = rewrite;
      document.querySelector('input[name="mode"][value="seo"]').checked = !rewrite;
      els.segRewrite.classList.toggle('active', rewrite);
      els.segSEO.classList.toggle('active', !rewrite);
      els.modeBadge.textContent = 'Mode : ' + (rewrite ? 'Réécriture SEO/GEO' : 'Optimisation SEO/GEO');
      // Fond distinct SEO : page + carte outil
      els.body.classList.toggle('seo-mode', !rewrite);
    }

    // ====== Compteurs / concurrents ======
    function updateCounter(){
      const n = els.articleContent.value.length;
      els.articleCounter.textContent = n + ' caractères';
      els.articleCounter.className = 'counter ' + (n < 400 ? 'bad' : 'good');
    }
    function escapeHtml(str=''){
      return str.replace(/[&<>"']/g, (m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
    }
    function addCompetitor(prefillTitle='', prefillContent=''){
      competitorCount++;
      const id = competitorCount;
      const block = document.createElement('div');
      block.className = 'concurrent-block';
      block.dataset.cid = id;
      block.innerHTML = `
        <div class="row">
          <div>
            <label for="concurrentTitle${id}">Titre de l'article concurrent ${id}</label>
            <input type="text" id="concurrentTitle${id}" placeholder="Titre de l'article concurrent..." value="${escapeHtml(prefillTitle)}"/>
          </div>
          <div>
            <label>&nbsp;</label>
            <button class="btn-ghost" type="button" data-remove="${id}">Supprimer ce concurrent</button>
          </div>
        </div>
        <label for="concurrentContent${id}">Contenu de l'article concurrent ${id}</label>
        <textarea id="concurrentContent${id}" rows="6" placeholder="Collez ici le contenu...">${escapeHtml(prefillContent)}</textarea>
      `;
      els.concurrentsContainer.appendChild(block);
      block.querySelector(`[data-remove="${id}"]`).addEventListener('click', ()=> block.remove());
    }
    function collectCompetitors(){
      const arr = [];
      els.concurrentsContainer.querySelectorAll('.concurrent-block').forEach(block=>{
        const id = block.dataset.cid;
        const t = block.querySelector(`#concurrentTitle${id}`)?.value?.trim() || '';
        const c = block.querySelector(`#concurrentContent${id}`)?.value?.trim() || '';
        if(t || c){ arr.push({title:t, content:c}); }
      });
      return arr;
    }
    function buildCompetitorsText(){
      const comps = collectCompetitors();
      if(!comps.length) return '(Aucun concurrent fourni)';
      return comps.map((c,i)=>`---\nArticle concurrent ${i+1}\nTitre : ${c.title || '(sans titre)'}\nContenu :\n${c.content || '(vide)'}`).join('\n\n');
    }

    // ====== Templates de prompt ======
    function formatExtra(extra){
      return (extra && extra.trim().length>0)
        ? `
________________________________________
🧩 Instructions supplémentaires de l'utilisateur
${extra.trim()}
` : '';
    }

    function commonRules(){
      return `________________________________________
📌 Règles obligatoires SEO/GEO/Juridique
• Répondre directement dès le début des H2 formulés en question, puis développer.
• Éviter toute répétition entre introduction, H2, FAQ, conclusion et blocs récapitulatifs.
• Prioriser les listes à puces pour les conditions, étapes, risques, exceptions, documents, délais et mentions obligatoires.
• Garder des paragraphes courts, humains et lisibles. Éviter les gros blocs.
• Distinguer clairement : définition, conditions d'accès, procédure, exceptions, délais, coût, risques, rôle de l'avocat, action à faire.
• Rendre le contenu utile à un justiciable : concret, clair, actionnable, pas seulement théorique.
• Renforcer l'intention avocat quand c'est pertinent : expliquer quand et pourquoi consulter, sans ton publicitaire forcé.
• Pour la France : éviter “avocat spécialisé” sauf spécialisation officiellement certifiée. Préférer “avocat en…”, “avocat intervenant en…”, “avocat compétent en…”.
• Pour FR / BE / UK : respecter le vocabulaire, les procédures et les institutions du pays concerné. Ne pas mélanger les droits.
• Références juridiques : citer dans le corps seulement quand cela aide vraiment, puis proposer une section courte en bas de type “Les règles juridiques à vérifier” / “Le cadre légal à connaître”.
• FAQ : réponses courtes et directes. Si un lien interne est utile, répondre d'abord puis proposer le lien. Ne jamais mettre uniquement un lien.
• GEO : phrases claires, extractibles, sans blabla. Les réponses doivent pouvoir être reprises par Google AI Overview, ChatGPT, Gemini ou Perplexity.
• Ne pas copier les concurrents : identifier ce qu'ils font mieux, puis proposer une version plus utile, plus juridique et plus high intent.`;
    }

    function tmplRewrite({title, market, content, comps, extra}){
      const extraBlock = formatExtra(extra);
      return `✅ PROMPT — ANALYSE & RÉÉCRITURE TOTALE SEO/GEO (ARTICLE JURIDIQUE JUSTIFIT)

Tu agis comme un expert senior en SEO, GEO, rédaction juridique et stratégie de conversion avocat.
Ta mission : analyser l'article fourni, le comparer aux concurrents, puis produire des recommandations précises pour une réécriture totale plus utile, plus juridique, plus claire et plus high intent.

Marché juridique : ${market || 'Non précisé'}

${commonRules()}

________________________________________
🔍 Article Justifit à analyser
Titre : ${title || '(sans titre)'}
Contenu :
${content || '(vide)'}

________________________________________
📎 Articles concurrents à dépasser
${comps}

________________________________________
1) Diagnostic rapide
Donne une analyse courte et franche :
• Intent actuel : Low / Medium / High
• Intent cible recommandé : Low / Medium / High
• Public cible réel : justiciable informé / justiciable en urgence / personne prête à contacter un avocat
• Niveau juridique : insuffisant / correct / solide / à sécuriser
• Niveau GEO : faible / moyen / bon / excellent
• Niveau conversion avocat : faible / moyen / fort

________________________________________
2) Ce que les concurrents abordent mieux
Liste uniquement les éléments vraiment utiles que les concurrents traitent mieux :
• points juridiques absents ;
• conditions, exceptions, délais ou démarches oubliés ;
• risques concrets non expliqués ;
• exemples ou cas pratiques plus utiles ;
• références légales pertinentes ;
• structure plus claire ou plus extractible.

Pour chaque point, indique :
• pourquoi c'est utile pour le lecteur ;
• si c'est high intent avocat ;
• où l'ajouter dans l'article.

________________________________________
3) Parties à supprimer, fusionner ou raccourcir
Repère les répétitions et les passages faibles :
• phrases qui répètent l'introduction ;
• H2/H3 redondants ;
• blocs “À retenir” ou conclusions qui répètent déjà l'article ;
• infos datées, floues ou juridiquement risquées ;
• paragraphes trop longs à transformer en listes.

Donne une décision claire : Supprimer / Fusionner / Réécrire / Garder.

________________________________________
4) Nouvelle structure Hn recommandée
Propose une structure complète H1/H2/H3, en évitant les doublons.
Chaque H2 en question doit avoir une réponse directe prévue dès la première phrase.
Intègre si pertinent :
• définition ;
• conditions ;
• procédure étape par étape ;
• rôle de l'avocat ;
• rôle de l'administration / tribunal / notaire selon le pays ;
• coûts, délais, exceptions ;
• cas particuliers ;
• FAQ ;
• règles juridiques à vérifier / cadre légal.

________________________________________
5) Recommandations de réécriture par section
Pour chaque section importante, donne :
• objectif de la section ;
• angle à adopter ;
• éléments juridiques à intégrer ;
• format conseillé : paragraphe court, liste, tableau, FAQ, CTA ;
• CTA ou lien interne éventuel.

________________________________________
6) FAQ recommandée
Propose uniquement les FAQ utiles, sans répéter les H2.
Pour chaque FAQ :
• indique si elle est déjà traitée dans l'article ;
• décision : garder / supprimer / fusionner ;
• réponse courte et directe si elle doit être gardée.

________________________________________
7) Références juridiques
Indique les références officielles à citer :
• celles à mentionner dans le corps du texte ;
• celles à mettre seulement en bas dans une section dédiée ;
• le titre conseillé pour la section finale, en évitant un style trop “service public”.

________________________________________
8) Checklist finale helpful content
Vérifie que la future version :
• répond vite à la question principale ;
• aide réellement le justiciable ;
• couvre les risques, démarches, délais et exceptions ;
• explique quand consulter un avocat ;
• évite les répétitions ;
• reste humain, clair et juridiquement sûr ;
• est meilleure que les concurrents sans les copier.${extraBlock}`;
    }

    function tmplSEO({title, market, content, comps, extra}){
      const extraBlock = formatExtra(extra);
      return `✅ PROMPT — OPTIMISATION SEO/GEO (RETOUCHES CIBLÉES, SANS RÉÉCRITURE TOTALE)

Tu agis comme un expert senior en SEO, GEO, rédaction juridique et optimisation de contenus Justifit.
Objectif : proposer uniquement les retouches essentielles pour améliorer l'article existant sans tout réécrire.
Si l'article doit vraiment être réécrit totalement, commence par : “⚠️ À réécrire totalement” puis donne 3 raisons précises.

Marché juridique : ${market || 'Non précisé'}

${commonRules()}

________________________________________
🔍 Article à optimiser
Titre : ${title || '(sans titre)'}
Contenu :
${content || '(vide)'}

________________________________________
📎 Concurrents / références à dépasser
${comps}

________________________________________
1) Diagnostic en 5 lignes maximum
• Problème principal SEO/GEO
• Problème principal juridique
• Problème principal UX/lecture
• Problème principal conversion avocat
• Opportunité prioritaire

________________________________________
2) Actions prioritaires — maximum 12
Donne une liste ultra concrète, classée par priorité.
Pour chaque action :
• Section concernée ;
• Problème détecté ;
• Correction exacte à faire ;
• Impact attendu : SEO / GEO / juridique / conversion.

________________________________________
3) Répétitions et suppressions
Liste les passages à supprimer, fusionner ou raccourcir :
• intro qui répète un H2 ;
• FAQ qui répète une section ;
• conclusion ou points clés inutiles ;
• références juridiques trop lourdes ;
• phrases datées ou risquées.

Réponds au format :
• Passage : …
• Décision : Supprimer / Fusionner / Réécrire / Garder
• Pourquoi : …

________________________________________
4) Optimisation des H2/H3
Pour chaque H2 important :
• vérifier s'il répond à une vraie intention ;
• proposer une version plus SEO/GEO si nécessaire ;
• indiquer la première phrase idéale si le H2 est une question ;
• éviter toute répétition avec l'introduction.

________________________________________
5) Amélioration des passages clés
Réécris seulement les passages nécessaires :
• introduction si elle n'est pas directe ;
• H2/H3 trop faibles ;
• CTA avocat ;
• FAQ ;
• section références juridiques.

Contraintes : style humain, paragraphes courts, listes à puces si utile.

________________________________________
6) FAQ
À partir des questions associées ou du contenu :
• dire quelles FAQ garder ;
• dire lesquelles supprimer car déjà traitées ;
• proposer des réponses courtes, directes, non répétitives ;
• ajouter un lien interne seulement après une réponse utile.

________________________________________
7) Références juridiques
Recommander :
• les lois/références à citer dans le corps ;
• celles à regrouper en bas ;
• le meilleur titre de section selon l'angle de l'article.

________________________________________
8) Résultat attendu
Termine par un résumé :
• Ce qu'on gagne face aux concurrents ;
• Ce qui devient plus high intent ;
• Ce qui devient plus helpful ;
• Ce qui devient plus extractible pour le GEO.${extraBlock}`;
    }

    // ====== Génération ======
    function generatePrompt(){
      const mode = getMode();
      const title = els.articleTitle.value.trim();
      const market = els.market.value;
      const content = els.articleContent.value.trim();
      const extra = els.extra.value;

      if(!title) showToast('Ajoute au moins un titre pour cadrer l’analyse.');
      if(content.length < 200) showToast('Le contenu est très court : vise ≥ 400 caractères pour une analyse pertinente.');

      const comps = buildCompetitorsText();
      const payload = { title, market, content, comps, extra };
      const out = (mode === 'seo') ? tmplSEO(payload) : tmplRewrite(payload);
      els.output.textContent = out;
      document.getElementById('outputHead').scrollIntoView({behavior:'smooth', block:'center'});
    }

    // ====== UI ======
    function showToast(msg){
      els.toast.textContent = msg || 'OK';
      els.toast.classList.add('show');
      setTimeout(()=> els.toast.classList.remove('show'), 1400);
    }

    // ====== Événements ======
    els.btnAddCompetitor.addEventListener('click', ()=> addCompetitor());
    els.btnGenerate.addEventListener('click', generatePrompt);
    function copyPrompt(){
      const txt = els.output.textContent.trim();
      if(!txt){ showToast('Aucun prompt à copier.'); return; }
      navigator.clipboard.writeText(txt).then(()=> showToast('Copié dans le presse‑papiers ✅'))
      .catch(()=>{
        // fallback
        const ta = document.createElement('textarea');
        ta.value = txt; document.body.appendChild(ta); ta.select();
        try{ document.execCommand('copy'); showToast('Copié dans le presse‑papiers ✅'); }catch(e){}
        ta.remove();
      });
    }
    els.btnCopy.addEventListener('click', copyPrompt);
    els.btnCopyTop.addEventListener('click', copyPrompt);
    els.btnReset.addEventListener('click', ()=>{
      els.articleTitle.value = '';
      els.market.value = 'Non précisé';
      els.articleContent.value = '';
      els.extra.value = '';
      els.output.textContent = '';
      els.concurrentsContainer.innerHTML = '';
      competitorCount = 0;
      addCompetitor();
      updateCounter();
      setMode('rewrite');
      showToast('Réinitialisé ✅');
    });
    els.articleContent.addEventListener('input', updateCounter);
    els.modeBox.addEventListener('click', (e)=>{
      const label = e.target.closest('.seg');
      if(!label) return;
      const mode = (label===els.segRewrite) ? 'rewrite' : 'seo';
      setMode(mode);
    });

    // ====== Init ======
    (function init(){
      addCompetitor();
      updateCounter();
    })();
  </script>
